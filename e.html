<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geometry Dash AI Remake</title>
    <style>
        /* CSS to make the page dark and center the game */
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }
        canvas {
            background-color: #1e1e3c; /* Dark blue background */
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.2);
            border: 2px solid #333;
            border-radius: 5px;
        }
        h1 {
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p { 
            margin-top: 10px; 
            color: #aaa; 
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Geometry Dash</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <p>Press SPACEBAR or CLICK to jump!</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 1. Game Variables
        let gameSpeed = 8;

        // 2. Player (The Cube)
        const player = {
            x: 150,
            y: 300,
            size: 40,
            yVelocity: 0,
            gravity: 0.8,
            jumpStrength: -13,
            isJumping: false,

            draw: function() {
                ctx.fillStyle = "#00ffc8"; // Neon cyan
                ctx.shadowColor = "#00ffc8"; // Glow effect
                ctx.shadowBlur = 15;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.shadowBlur = 0; // Reset shadow so other things don't glow cyan
            },

            update: function() {
                // Apply Gravity
                this.yVelocity += this.gravity;
                this.y += this.yVelocity;

                // Ground Collision
                if (this.y + this.size >= 340) {
                    this.y = 340 - this.size;
                    this.yVelocity = 0;
                    this.isJumping = false;
                }
            },

            jump: function() {
                if (!this.isJumping) {
                    this.yVelocity = this.jumpStrength;
                    this.isJumping = true;
                }
            }
        };

        // 3. Obstacle (The Spike)
        const spike = {
            x: 800,
            y: 300,
            width: 40,
            height: 40,

            draw: function() {
                ctx.fillStyle = "#ff3232"; // Neon red
                ctx.shadowColor = "#ff3232"; // Glow effect
                ctx.shadowBlur = 15;
                
                // Draw a triangle
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.height);               // Bottom left
                ctx.lineTo(this.x + this.width, this.y + this.height);  // Bottom right
                ctx.lineTo(this.x + (this.width / 2), this.y);          // Top center
                ctx.closePath();
                ctx.fill();
                
                ctx.shadowBlur = 0; // Reset shadow
            },

            update: function() {
                this.x -= gameSpeed;
                
                // Reset spike when it goes off screen
                if (this.x + this.width < 0) {
                    this.x = 800 + Math.random() * 200; // Add slight randomness to when it appears
                }
            }
        };

        // 4. Ground
        const ground = {
            y: 340,
            height: 60,
            draw: function() {
                ctx.fillStyle = "#323264"; // Dark blueish gray
                ctx.fillRect(0, this.y, canvas.width, this.height);
                
                // Draw a bright line right at the floor edge
                ctx.fillStyle = "white";
                ctx.fillRect(0, this.y, canvas.width, 2);
            }
        };

        // 5. Input Handling (Keyboard and Mouse)
        window.addEventListener("keydown", function(e) {
            if (e.code === "Space") player.jump();
        });
        window.addEventListener("mousedown", function() {
            player.jump();
        });
        window.addEventListener("touchstart", function() {
            player.jump(); // Works on mobile too!
        });

        // 6. Collision Detection
        function checkCollision() {
            // Axis-Aligned Bounding Box (AABB) collision
            if (player.x < spike.x + spike.width &&
                player.x + player.size > spike.x &&
                player.y < spike.y + spike.height &&
                player.y + player.size > spike.y) {
                
                // CRASH! Reset Game
                spike.x = 800;
                player.y = 340 - player.size;
                player.yVelocity = 0;
            }
        }

        // 7. Main Game Loop
        function animate() {
            // Clear the canvas every frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw objects
            ground.draw();
            
            player.update();
            player.draw();
            
            spike.update();
            spike.draw();

            // Check if player hit the spike
            checkCollision();

            // Loop the animation
            requestAnimationFrame(animate);
        }

        // Start the game
        animate();
    </script>
</body>
</html>
