<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War with Cubes: Blood Hunger</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff0055;
            --bg: #030305;
            --panel: rgba(15, 15, 25, 0.9);
            --accent: #ffaa00;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        canvas { display: block; }

        /* --- NON-ZOOMING UI LAYER --- */
        #ui-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* Allows clicking through to canvas */
            z-index: 10;
        }

        #ui-layer > * { pointer-events: auto; }

        /* --- MAIN MENU --- */
        #main-menu {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #101025 0%, #030305 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
        }

        .menu-card {
            background: var(--panel);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(45deg, var(--primary), #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 12px;
        }

        button {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            margin: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 30px var(--primary);
            transform: translateY(-3px);
        }

        /* --- BETTER LEADERBOARD --- */
        #leaderboard {
            position: absolute;
            top: 20px; right: 20px;
            width: 280px;
            background: var(--panel);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            max-height: 50vh;
            overflow-y: auto;
        }

        .lb-header {
            color: var(--primary);
            font-weight: bold;
            font-size: 0.9rem;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            margin-bottom: 10px;
            display: flex; justify-content: space-between;
        }

        .lb-entry {
            display: grid;
            grid-template-columns: 20px 1fr 50px;
            gap: 10px;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .lb-entry:hover { background: rgba(255,255,255,0.1); }
        .lb-rank { color: #666; font-weight: bold; }
        .lb-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lb-kills { color: var(--accent); font-weight: bold; text-align: right; }

        /* --- STATS PANEL --- */
        #stats-panel {
            position: absolute;
            bottom: 20px; left: 20px;
            width: 320px;
            background: var(--panel);
            border-radius: 20px;
            padding: 20px;
            display: none;
            border-left: 5px solid var(--primary);
        }

        .h-bar-container { height: 10px; background: #222; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .h-bar-fill { height: 100%; background: #00ff88; width: 100%; transition: 0.3s; }

        /* --- JOIN BUTTON --- */
        #join-btn-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        #join-game-btn {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        #join-game-btn:hover {
            background: var(--secondary);
            color: #fff;
            box-shadow: 0 0 30px var(--secondary);
        }
    </style>
</head>
<body>

<div id="main-menu">
    <div class="menu-card">
        <h1>CUBE WAR</h1>
        <p style="opacity: 0.5; margin-bottom: 30px;">500 CUBES. ONE SURVIVOR.</p>
        <button onclick="initGame(false)">Spectate War</button>
        <button onclick="initGame(true)" style="border-color: var(--secondary); color: var(--secondary);">Play as Cube</button>
    </div>
</div>

<div id="ui-layer">
    <div id="leaderboard">
        <div class="lb-header">
            <span>WARRIOR</span>
            <span>KILLS</span>
        </div>
        <div id="lb-list"></div>
    </div>

    <div id="stats-panel">
        <div style="font-size: 1.2rem; font-weight: bold;" id="st-name">Name</div>
        <div style="font-size: 0.8rem; opacity: 0.7; color: var(--primary)" id="st-emotion">Aggressive</div>
        <div class="h-bar-container"><div class="h-bar-fill" id="st-health"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
            <span>Kills: <b id="st-kills">0</b></span>
            <span>Stamina: <b id="st-stamina">100</b></span>
        </div>
        <div style="margin-top: 20px; display: flex; gap: 5px;">
            <button onclick="admin('kill')" style="flex:1; padding: 5px; font-size: 0.7rem;">Kill</button>
            <button onclick="admin('heal')" style="flex:1; padding: 5px; font-size: 0.7rem;">Heal</button>
            <button onclick="admin('god')" id="god-btn" style="flex:1; padding: 5px; font-size: 0.7rem;">God</button>
        </div>
        <button onclick="closeStats()" style="width: 100%; border: none; font-size: 0.7rem; margin-top: 10px; opacity: 0.5;">Close</button>
    </div>

    <div id="join-btn-container">
        <button id="join-game-btn" onclick="joinMidGame()">Join as Player</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let entities = [];
let obstacles = [];
let mapSize = 3500;
let circleRadius = 0;
let isShrinking = false;
let startTime = 0;
let gameRunning = false;
let userPlayer = null;
let selectedEntity = null;

let camera = { x: 0, y: 0, zoom: 0.3, target: null };
const keys = {};

// Camera and Mouse
let isDragging = false;
let lastMouse = { x: 0, y: 0 };

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('wheel', e => {
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    camera.zoom = Math.max(0.05, Math.min(3, camera.zoom * delta));
});
canvas.addEventListener('mousedown', e => { if(e.button === 2) isDragging = true; lastMouse = {x: e.clientX, y: e.clientY}; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
    if(isDragging) {
        camera.x -= (e.clientX - lastMouse.x) / camera.zoom;
        camera.y -= (e.clientY - lastMouse.y) / camera.zoom;
        camera.target = null;
    }
    lastMouse = {x: e.clientX, y: e.clientY};
});

function initGame(asPlayer) {
    document.getElementById('main-menu').style.display = 'none';
    const count = 500;
    entities = [];
    obstacles = [];
    circleRadius = mapSize * 0.7;

    // Build Obstacles
    for(let i=0; i<80; i++) {
        obstacles.push({
            x: (Math.random()-0.5) * mapSize,
            y: (Math.random()-0.5) * mapSize,
            w: 50 + Math.random()*150,
            h: 50 + Math.random()*150
        });
    }

    // Spawn AI
    for(let i=0; i<count; i++) {
        spawnEntity(i, (asPlayer && i === 0));
    }

    gameRunning = true;
    startTime = Date.now();
    requestAnimationFrame(loop);
}

function spawnEntity(id, isPlayer) {
    let rx, ry, collided = true;
    while(collided) {
        rx = (Math.random()-0.5) * (mapSize*0.8);
        ry = (Math.random()-0.5) * (mapSize*0.8);
        collided = checkWall(rx, ry, 20);
    }
    const e = new Entity(id, rx, ry, isPlayer);
    entities.push(e);
    if(isPlayer) {
        userPlayer = e;
        document.getElementById('join-game-btn').style.display = 'none';
    }
}

function joinMidGame() {
    if(!gameRunning) return;
    spawnEntity(Date.now(), true);
}

class Entity {
    constructor(id, x, y, isPlayer) {
        this.id = id;
        this.x = x; this.y = y;
        this.isPlayer = isPlayer;
        this.name = isPlayer ? "YOU" : "Agent_"+id.toString().slice(-3);
        this.color = isPlayer ? "#ffffff" : `hsl(${Math.random()*360}, 80%, 60%)`;
        this.health = 100;
        this.kills = 0;
        this.stamina = 100;
        this.size = 22;
        this.vx = 0; this.vy = 0;
        this.target = null;
        this.emotion = "Idle";
        this.isGod = false;
    }

    update() {
        if(this.health <= 0) return;

        // Stamina logic
        if(this.stamina < 100) this.stamina += 0.25;

        const distFromCenter = Math.sqrt(this.x**2 + this.y**2);

        // --- BRAIN PRIORITY 1: THE RED ZONE ---
        if(isShrinking && distFromCenter > circleRadius * 0.85) {
            this.emotion = "Terrified";
            const angle = Math.atan2(0 - this.y, 0 - this.x);
            const speed = (this.stamina > 10) ? 6 : 3;
            this.vx += Math.cos(angle) * speed;
            this.vy += Math.sin(angle) * speed;
            if(this.stamina > 10) this.stamina -= 0.5;
            
            if(distFromCenter > circleRadius) this.health -= 0.3; // Damage in red
        } 
        // --- BRAIN PRIORITY 2: COMBAT ---
        else if(this.isPlayer) {
            this.handlePlayer();
        } else {
            this.handleAI();
        }

        // Apply movement & Collision
        const nx = this.x + this.vx;
        const ny = this.y + this.vy;
        
        if(!checkWall(nx, this.y, this.size)) this.x = nx;
        if(!checkWall(this.x, ny, this.size)) this.y = ny;

        this.vx *= 0.8;
        this.vy *= 0.8;
    }

    handlePlayer() {
        let s = 4;
        if(keys['ShiftLeft'] && this.stamina > 1) {
            s = 7 * (1 + (1 - this.health/100));
            this.stamina -= 0.8;
            this.emotion = "Sprinting";
        } else {
            this.emotion = "Combat Ready";
        }
        if(keys['KeyW']) this.vy -= s;
        if(keys['KeyS']) this.vy += s;
        if(keys['KeyA']) this.vx -= s;
        if(keys['KeyD']) this.vx += s;
    }

    handleAI() {
        // Find closest target
        if(!this.target || this.target.health <= 0 || Math.random() < 0.02) {
            let closest = null;
            let minDist = 1200; // Blood hunger range
            for(let i=0; i<40; i++) { // Sample randoms for perf
                let other = entities[Math.floor(Math.random()*entities.length)];
                if(other === this || other.health <= 0) continue;
                let d = Math.sqrt((other.x-this.x)**2 + (other.y-this.y)**2);
                if(d < minDist) { minDist = d; closest = other; }
            }
            this.target = closest;
        }

        if(this.target) {
            this.emotion = "Blood Hungry";
            const dx = this.target.x - this.x;
            const dy = this.target.y - this.y;
            const d = Math.sqrt(dx*dx + dy*dy);
            const speed = (this.health < 30) ? 2 : 4;
            this.vx += (dx/d) * speed;
            this.vy += (dy/d) * speed;

            if(d < 30) {
                this.target.health -= 1.5;
                if(this.target.health <= 0) this.kills++;
            }
        } else {
            this.emotion = "Searching...";
            // Drift toward center to avoid edge camping
            this.vx += (0 - this.x) * 0.001;
            this.vy += (0 - this.y) * 0.001;
        }
    }

    draw() {
        if(this.health <= 0) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Glow
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        
        // Face
        ctx.fillStyle = "#000";
        ctx.fillRect(2, -5, 4, 4);
        ctx.fillRect(-6, -5, 4, 4);

        ctx.restore();
    }
}

function checkWall(x, y, s) {
    for(let o of obstacles) {
        if(x + s/2 > o.x && x - s/2 < o.x + o.w && y + s/2 > o.y && y - s/2 < o.y + o.h) return true;
    }
    return Math.abs(x) > mapSize/2 || Math.abs(y) > mapSize/2;
}

function loop() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const elapsed = (Date.now() - startTime) / 1000;
    if(elapsed > 60) {
        isShrinking = true;
        circleRadius = Math.max(250, circleRadius - 0.6);
    }

    // Camera move
    if(camera.target) {
        camera.x += (camera.target.x - camera.x) * 0.1;
        camera.y += (camera.target.y - camera.y) * 0.1;
    } else if(userPlayer && userPlayer.health > 0) {
        camera.x += (userPlayer.x - camera.x) * 0.1;
        camera.y += (userPlayer.y - camera.y) * 0.1;
    }

    // Draw World
    ctx.fillStyle = varColor('--bg');
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.scale(camera.zoom, camera.zoom);
    ctx.translate(-camera.x, -camera.y);

    // Grid
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    for(let i=-mapSize/2; i<=mapSize/2; i+=200) {
        ctx.beginPath(); ctx.moveTo(i, -mapSize/2); ctx.lineTo(i, mapSize/2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-mapSize/2, i); ctx.lineTo(mapSize/2, i); ctx.stroke();
    }

    // Red Zone
    ctx.strokeStyle = isShrinking ? "#ff0055" : "#00f2ff";
    ctx.lineWidth = 20 / camera.zoom;
    ctx.beginPath(); ctx.arc(0,0,circleRadius,0,Math.PI*2); ctx.stroke();

    // Obstacles
    ctx.fillStyle = "#11111a";
    ctx.strokeStyle = "rgba(0,242,255,0.1)";
    ctx.lineWidth = 2;
    obstacles.forEach(o => {
        ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeRect(o.x, o.y, o.w, o.h);
    });

    entities.forEach(e => {
        e.update();
        e.draw();
    });

    ctx.restore();
    updateUI();
    requestAnimationFrame(loop);
}

function updateUI() {
    const alive = entities.filter(e => e.health > 0).sort((a,b) => b.kills - a.kills);
    const top = alive.slice(0, 15);

    document.getElementById('lb-list').innerHTML = top.map((e, i) => `
        <div class="lb-entry" onclick="selectEnt(${e.id})">
            <span class="lb-rank">${i+1}</span>
            <span class="lb-name" style="color:${e.color}">${e.name}</span>
            <span class="lb-kills">${e.kills}</span>
        </div>
    `).join('');

    if(selectedEntity) {
        document.getElementById('st-name').innerText = selectedEntity.name;
        document.getElementById('st-name').style.color = selectedEntity.color;
        document.getElementById('st-emotion').innerText = selectedEntity.emotion;
        document.getElementById('st-kills').innerText = selectedEntity.kills;
        document.getElementById('st-stamina').innerText = Math.floor(selectedEntity.stamina);
        document.getElementById('st-health').style.width = selectedEntity.health + "%";
        document.getElementById('god-btn').style.background = selectedEntity.isGod ? "var(--primary)" : "transparent";
        if(selectedEntity.health <= 0) closeStats();
    }
}

canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left - canvas.width/2) / camera.zoom + camera.x;
    const my = (e.clientY - rect.top - canvas.height/2) / camera.zoom + camera.y;
    const found = entities.find(ent => ent.health > 0 && Math.abs(ent.x - mx) < 30 && Math.abs(ent.y - my) < 30);
    if(found) selectEnt(found.id);
});

function selectEnt(id) {
    selectedEntity = entities.find(e => e.id === id);
    camera.target = selectedEntity;
    document.getElementById('stats-panel').style.display = 'block';
}

function closeStats() {
    selectedEntity = null;
    camera.target = null;
    document.getElementById('stats-panel').style.display = 'none';
}

function admin(type) {
    if(!selectedEntity) return;
    if(type === 'kill') selectedEntity.health = 0;
    if(type === 'heal') selectedEntity.health = 100;
    if(type === 'god') selectedEntity.isGod = !selectedEntity.isGod;
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }
canvas.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
