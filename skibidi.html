<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IN THE DARK: The Hunt Update</title>
    <style>
        :root { --red: #e94560; --blue: #00d2ff; --purple: #a855f7; --gold: #fbbf24; --bg: #050508; --panel: #11111a; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 600px; background-color: #000; overflow: hidden; border: 2px solid #222; border-radius: 12px; }
        canvas { display: block; }
        
        /* UI Panels */
        .panel { position: absolute; inset: 0; background: rgba(5, 5, 10, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        .hidden { display: none !important; }
        
        h1 { font-size: 3.5rem; margin: 0; color: var(--red); text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 15px rgba(233, 69, 96, 0.4); }
        .desc-box { font-size: 0.85rem; color: #888; margin: 10px 0 25px 0; text-align: center; max-width: 400px; min-height: 40px; background: #161625; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        
        .row { display: flex; gap: 12px; margin-bottom: 15px; }
        .bank-badge { background: #1a1a2e; padding: 10px 25px; border-radius: 30px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; margin-bottom: 20px; font-size: 1.2rem; }
        
        /* Buttons & Inputs */
        select, button { padding: 14px 24px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; background: #16213e; color: white; }
        button { background: var(--red); }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        button:disabled { background: #333; cursor: not-allowed; transform: none; }
        .btn-shop { background: #1f1f35; border: 1px solid #444; }
        
        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .stat-box { background: rgba(0,0,0,0.7); padding: 12px 18px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        #stamina-bar { width: 140px; height: 8px; background: #222; border-radius: 4px; margin-top: 8px; overflow: hidden; border: 1px solid #444; }
        #stamina-fill { width: 100%; height: 100%; background: var(--gold); }

        /* Notification Toast */
        #toast { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #4ade80; color: black; padding: 12px 30px; border-radius: 50px; font-weight: bold; opacity: 0; transition: 0.5s; z-index: 100; }
        .show-toast { opacity: 1 !important; transform: translateX(-50%) translateY(-20px) !important; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="toast">ITEM UNLOCKED!</div>

    <div id="hud" class="hidden">
        <div class="stat-box">
            <div id="timer-text">TIME: 0.0s</div>
            <div id="stamina-bar"><div id="stamina-fill"></div></div>
        </div>
        <div class="stat-box" style="text-align: right;">
            <div id="orb-text" style="color: var(--blue)">ORBS: 0/3</div>
            <div id="bank-hud" style="color: var(--gold); font-size: 0.8rem;">BANK: 0</div>
        </div>
    </div>

    <div id="menu-main" class="panel">
        <h1>IN THE DARK</h1>
        <div class="bank-badge">BANK: <span id="display-bank">0</span></div>
        
        <div class="row">
            <select id="select-role" onchange="updateDiffDesc()">
                <option value="hider">Role: Hider</option>
                <option value="seeker" id="opt-seeker" disabled>Role: Seeker (Locked)</option>
            </select>
            <select id="select-diff" onchange="updateDiffDesc()">
                <option value="normal">Normal Difficulty</option>
                <option value="hard">Hard Difficulty</option>
            </select>
            <select id="select-map">
                <option value="0">The Cross</option>
                <option value="1">The Maze</option>
                <option value="2">Neighborhood</option>
                <option value="3" id="map-3-opt" disabled>Forest (Locked)</option>
                <option value="4" id="map-4-opt" disabled>Dungeon (Locked)</option>
            </select>
        </div>

        <div class="desc-box" id="diff-desc">Choose a role and difficulty.</div>
        
        <div class="row">
            <button onclick="startGame()">ENTER THE DARK</button>
            <button class="btn-shop" onclick="openPanel('menu-shop')">THE SHOP</button>
        </div>
    </div>

    <div id="menu-shop" class="panel hidden">
        <h1>THE SHOP</h1>
        <div class="bank-badge">BANK: <span id="shop-bank">0</span></div>
        
        <div class="row" style="flex-direction: column; width: 350px;">
            <button id="buy-seeker" onclick="buyItem('seeker', 50)">Unlock Seeker Mode (50 Orbs)</button>
            <button id="buy-map-3" onclick="buyItem('map3', 15)">Unlock Forest Map (15 Orbs)</button>
            <button id="buy-map-4" onclick="buyItem('map4', 30)">Unlock Dungeon Map (30 Orbs)</button>
            <div class="row" style="margin-top:10px; width: 100%;">
                <button class="btn-shop" style="flex:1; color:var(--gold)" onclick="buyItem('colorGold', 10)">Gold Skin (10)</button>
                <button class="btn-shop" style="flex:1; color:var(--purple)" onclick="buyItem('colorPurple', 15)">Purple Skin (15)</button>
            </div>
        </div>
        <button class="btn-shop" onclick="openPanel('menu-main')" style="margin-top: 20px; width: 350px;">RETURN</button>
    </div>

    <div id="menu-over" class="panel hidden">
        <h1 id="over-title">CAUGHT</h1>
        <div id="over-msg" style="margin: 10px 0 20px 0; color: #888;">You didn't survive.</div>
        <div class="bank-badge">REWARD: +<span id="reward-count">0</span></div>
        <button onclick="openPanel('menu-main')" style="width: 250px;">PLAY AGAIN</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- Save System ---
    let storage = JSON.parse(localStorage.getItem('itd_save_v2')) || {
        bank: 50, // Starting Bonus
        unlocked: ['map0', 'map1', 'map2'],
        color: '#00d2ff'
    };

    function save() { 
        localStorage.setItem('itd_save_v2', JSON.stringify(storage)); 
        updateUI(); 
    }

    function showNotify(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show-toast');
        setTimeout(() => t.classList.remove('show-toast'), 2500);
    }

    // --- Game Logic ---
    let state = { running: false, phase: 'play', role: 'hider', map: 0, diff: 'normal', time: 0, stamina: 100, orbs: 0, totalOrbs: 3, world: {w:1600, h:1200}, cam: {x:0, y:0} };
    const keys = {};
    window.onkeydown = e => keys[e.key.toLowerCase()] = true;
    window.onkeyup = e => keys[e.key.toLowerCase()] = false;

    const player = { x: 0, y: 0, size: 20, speed: 2.5, sprint: 5.5 };
    let entities = []; // Hunters or Prey
    let allies = [];   // Seeker buddies
    let walls = [];
    let items = [];

    const mapData = [
        { name: "Cross", walls: [{x:700,y:200,w:200,h:800},{x:300,y:500,w:1000,h:200}], orbs: 3 },
        { name: "Maze", walls: [{x:200,y:200,w:1200,h:40},{x:200,y:200,w:40,h:600},{x:500,y:500,w:900,h:40},{x:200,y:960,w:1200,h:40},{x:1360,y:500,w:40,h:500}], orbs: 4 },
        { name: "Neighborhood", walls: [{x:100,y:100,w:300,h:300},{x:1000,y:100,w:300,h:300},{x:500,y:700,w:400,h:400}], orbs: 6 },
        { name: "Forest", walls: [{x:200,y:200,w:100,h:100},{x:1000,y:800,w:100,h:100}], orbs: 8 },
        { name: "Dungeon", walls: [{x:0,y:400,w:700,h:50},{x:900,y:400,w:700,h:50}], orbs: 10 }
    ];

    function updateUI() {
        document.getElementById('display-bank').innerText = storage.bank;
        document.getElementById('shop-bank').innerText = storage.bank;
        document.getElementById('bank-hud').innerText = "BANK: " + storage.bank;

        if(storage.unlocked.includes('seeker')) {
            document.getElementById('opt-seeker').disabled = false;
            document.getElementById('opt-seeker').innerText = "Role: Seeker";
            document.getElementById('buy-seeker').disabled = true;
            document.getElementById('buy-seeker').innerText = "Seeker Mode Owned";
        }
        if(storage.unlocked.includes('map3')) { document.getElementById('map-3-opt').disabled = false; document.getElementById('map-3-opt').innerText = "Forest Map"; }
        if(storage.unlocked.includes('map4')) { document.getElementById('map-4-opt').disabled = false; document.getElementById('map-4-opt').innerText = "Dungeon Map"; }
        updateDiffDesc();
    }

    function updateDiffDesc() {
        const role = document.getElementById('select-role').value;
        const diff = document.getElementById('select-diff').value;
        const dBox = document.getElementById('diff-desc');
        
        if(role === 'seeker') {
            if(diff === 'normal') dBox.innerText = "Normal: Buddies with you and hiders are easy to find.";
            else dBox.innerText = "Hard: No buddies and hiders know where to hide and are harder to find.";
        } else {
            dBox.innerText = diff === 'normal' ? "Normal Hider: Stay away from the 4 Seekers." : "Hard Hider: The Seekers always know where you are!";
        }
    }

    function buyItem(id, cost) {
        if(storage.bank >= cost) {
            storage.bank -= cost;
            if(id === 'colorGold') { storage.color = '#fbbf24'; showNotify("Gold Skin Equipped!"); }
            else if(id === 'colorPurple') { storage.color = '#a855f7'; showNotify("Purple Skin Equipped!"); }
            else { storage.unlocked.push(id); showNotify("Unlock Successful!"); }
            save();
        } else { showNotify("Not enough orbs!"); }
    }

    function openPanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
        if(id !== 'none') document.getElementById(id).classList.remove('hidden');
    }

    function collision(x, y, s) {
        if (x < 0 || x + s > state.world.w || y < 0 || y + s > state.world.h) return true;
        for (let w of walls) { if (x < w.x + w.w && x + s > w.x && y < w.y + w.h && y + s > w.y) return true; }
        return false;
    }

    function startGame() {
        state.role = document.getElementById('select-role').value;
        state.diff = document.getElementById('select-diff').value;
        state.map = parseInt(document.getElementById('select-map').value);
        
        walls = mapData[state.map].walls;
        state.totalOrbs = mapData[state.map].orbs;
        state.orbs = 0;
        state.time = 0;
        state.stamina = 100;
        
        // Spawn Player
        player.x = 100; player.y = 100;

        // Items for Hider Mode
        items = [];
        if(state.role === 'hider') {
            for(let i=0; i<state.totalOrbs; i++) {
                let rx = Math.random()*1500+50, ry = Math.random()*1100+50;
                if(!collision(rx, ry, 20)) items.push({x:rx, y:ry, active:true}); else i--;
            }
        }

        // Entities
        entities = [];
        allies = [];
        let count = state.role === 'hider' ? 4 : 3;
        for(let i=0; i<count; i++) {
            entities.push({ x: 1400, y: 1000, size: 25, vx: Math.random()*2-1, vy: Math.random()*2-1, speed: state.role==='hider' ? 2.8 : 3.2 });
        }

        // Add Buddies in Normal Seeker mode
        if(state.role === 'seeker' && state.diff === 'normal') {
            allies.push({ x: 150, y: 150, size: 20, vx: 0, vy: 0, speed: 3 });
            allies.push({ x: 150, y: 200, size: 20, vx: 0, vy: 0, speed: 3 });
        }

        openPanel('none');
        document.getElementById('hud').classList.remove('hidden');
        state.running = true;
        loop();
    }

    function loop() {
        if(!state.running) return;
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function update() {
        // Player
        let mx = 0, my = 0;
        if(keys['w']) my -= 1; if(keys['s']) my += 1;
        if(keys['a']) mx -= 1; if(keys['d']) mx += 1;

        let sprint = keys['shift'] && state.stamina > 0 && (mx!==0 || my!==0);
        let speed = sprint ? player.sprint : player.speed;
        if(sprint) state.stamina -= 1.2; else state.stamina = Math.min(100, state.stamina + 0.6);
        
        if(!collision(player.x + mx*speed, player.y, player.size)) player.x += mx*speed;
        if(!collision(player.x, player.y + my*speed, player.size)) player.y += my*speed;

        state.cam.x = player.x - 400; state.cam.y = player.y - 300;
        state.cam.x = Math.max(0, Math.min(state.world.w-800, state.cam.x));
        state.cam.y = Math.max(0, Math.min(state.world.h-600, state.cam.y));

        if(state.role === 'hider') {
            items.forEach(it => { if(it.active && Math.hypot(player.x-it.x, player.y-it.y) < 30) { it.active = false; state.orbs++; if(state.orbs >= state.totalOrbs) endGame(true); } });
        }

        // Allies (Buddies)
        allies.forEach(al => {
            let target = entities[0]; // Simple AI: target the first hider
            if(target) {
                let ang = Math.atan2(target.y-al.y, target.x-al.x);
                al.vx = Math.cos(ang); al.vy = Math.sin(ang);
                al.x += al.vx * al.speed; al.y += al.vy * al.speed;
            }
        });

        // Entities AI
        entities.forEach((en, idx) => {
            if(state.role === 'hider') {
                let dist = Math.hypot(en.x-player.x, en.y-player.y);
                if(state.diff === 'hard' || dist < 300) {
                    let ang = Math.atan2(player.y-en.y, player.x-en.x);
                    en.vx = Math.cos(ang); en.vy = Math.sin(ang);
                }
                if(dist < 20) endGame(false);
            } else {
                // Seeker Mode: Hiders flee
                let dist = Math.hypot(en.x-player.x, en.y-player.y);
                if(dist < 200 || state.diff === 'hard') {
                    let ang = Math.atan2(en.y-player.y, en.x-player.x);
                    en.vx = Math.cos(ang); en.vy = Math.sin(ang);
                }
                if(dist < 25) { entities.splice(idx, 1); state.orbs++; if(state.orbs >= 3) endGame(true); }
            }
            if(!collision(en.x + en.vx*en.speed, en.y, en.size)) en.x += en.vx*en.speed; else { en.vx *= -1; en.vy *= -1; }
            if(!collision(en.x, en.y + en.vy*en.speed, en.size)) en.y += en.vy*en.speed;
        });

        state.time += 1/60;
        document.getElementById('timer-text').innerText = "TIME: " + state.time.toFixed(1) + "s";
        document.getElementById('stamina-fill').style.width = state.stamina + "%";
        document.getElementById('orb-text').innerText = "ORBS: " + state.orbs + "/" + (state.role==='hider' ? state.totalOrbs : 3);
    }

    function draw() {
        ctx.fillStyle = '#050508'; ctx.fillRect(0,0,800,600);
        
        ctx.fillStyle = '#111';
        for(let i=0; i<state.world.w; i+=100) ctx.fillRect(i-state.cam.x, 0-state.cam.y, 1, state.world.h);
        for(let i=0; i<state.world.h; i+=100) ctx.fillRect(0-state.cam.x, i-state.cam.y, state.world.w, 1);

        walls.forEach(w => {
            ctx.fillStyle = '#16213e'; ctx.fillRect(w.x-state.cam.x, w.y-state.cam.y, w.w, w.h);
            ctx.strokeStyle = varColor('--red'); ctx.strokeRect(w.x-state.cam.x, w.y-state.cam.y, w.w, w.h);
        });

        if(state.role === 'hider') {
            ctx.fillStyle = '#4ade80'; items.forEach(it => { if(it.active) ctx.fillRect(it.x-state.cam.x, it.y-state.cam.y, 15, 15); });
        }

        entities.forEach(en => {
            ctx.fillStyle = state.role === 'hider' ? varColor('--red') : varColor('--blue');
            ctx.fillRect(en.x-state.cam.x, en.y-state.cam.y, en.size, en.size);
        });

        allies.forEach(al => {
            ctx.fillStyle = '#5555ff'; ctx.fillRect(al.x-state.cam.x, al.y-state.cam.y, al.size, al.size);
        });

        ctx.fillStyle = storage.color;
        ctx.fillRect(player.x-state.cam.x, player.y-state.cam.y, player.size, player.size);

        let g = ctx.createRadialGradient(400, 300, 50, 400, 300, state.diff==='hard'?220:380);
        g.addColorStop(0, 'transparent'); g.addColorStop(1, state.diff==='hard'?'rgba(15,0,0,0.98)':'black');
        ctx.fillStyle = g; ctx.fillRect(0,0,800,600);
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    function endGame(win) {
        state.running = false;
        document.getElementById('hud').classList.add('hidden');
        openPanel('menu-over');
        
        let reward = win ? (state.orbs + (state.diff==='hard'?5:0) + (state.time<25?3:0)) : 0;
        storage.bank += reward;
        save();
        
        document.getElementById('over-title').innerText = win ? "MISSION SUCCESS" : "MISSION FAILED";
        document.getElementById('over-title').style.color = win ? "#4ade80" : "#e94560";
        document.getElementById('over-msg').innerText = win ? `You extracted with ${state.orbs} orbs!` : "You were caught in the darkness.";
        document.getElementById('reward-count').innerText = reward;
    }

    updateUI();
</script>
</body>
</html>
