<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>2D Hide and Seek with Map</title>
<style>
  body {
    margin: 0;
    background-color: #222;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  #gameCanvas {
    display: block;
    background-color: #444;
    margin: 0 auto;
    border: 2px solid #fff;
  }
  #ui {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-family: Arial, sans-serif;
    z-index: 10;
    text-align: center;
  }
  button {
    margin: 5px;
    padding: 10px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="ui">
  <button id="easyBtn">Easy</button>
  <button id="hardBtn">Hard</button>
</div>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let difficulty = 'easy'; // default
let gameStarted = false;

document.getElementById('easyBtn').onclick = () => { difficulty='easy'; startGame(); };
document.getElementById('hardBtn').onclick = () => { difficulty='hard'; startGame(); };

function startGame() {
  document.getElementById('ui').style.display='none';
  gameStarted=true;
  init();
  requestAnimationFrame(update);
}

// Player controls
const keys = {};
document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

// Define the map layout
const gameMap = {
  width: 800,
  height: 600,
  platforms: [
    {x: 100, y: 550, width: 200, height: 20},
    {x: 500, y: 450, width: 200, height: 20},
    {x: 300, y: 350, width: 150, height: 20},
    {x: 50, y: 250, width: 100, height: 20}
  ],
  obstacles: [
    {x: 400, y: 300, width: 50, height: 150},
    {x: 600, y: 200, width: 50, height: 150}
  ],
  hidingSpots: [
    {x: 150, y: 530, width: 30, height: 20},
    {x: 550, y: 430, width: 30, height: 20}
  ]
};

const player = {
  x: 50,
  y: 0,
  width: 30,
  height: 50,
  color: 'blue',
  speed: 2,
  sprintMultiplier: 2,
  jumpStrength: 15,
  vy: 0,
  onGround: false
};

const aiCount = 3;
let aiPlayers = [];

function init() {
  // Reset player position
  player.x = 50;
  player.y = 0;
  player.vy = 0;
  player.onGround = false;

  // Initialize AI opponents at random positions
  aiPlayers = [];
  for(let i=0; i<aiCount; i++) {
    aiPlayers.push({
      x: Math.random() * (gameMap.width - 50),
      y: 0,
      width: 30,
      height: 50,
      color: 'red',
      speed: 1 + Math.random(),
      targetX: Math.random() * (gameMap.width - 50),
      alerted: false
    });
  }
}

function update() {
  // Player movement
  let moveSpeed = player.speed;
  if (keys['shift']) moveSpeed *= player.sprintMultiplier;
  if (keys['a']) { player.x -= moveSpeed; }
  if (keys['d']) { player.x += moveSpeed; }
  if (keys['w'] && player.onGround) {
    player.vy = -player.jumpStrength;
    player.onGround = false;
  }

  // Gravity
  player.vy += 0.5;
  player.y += player.vy;

  // Collision with platforms and ground
  checkCollisions(player);

  // Boundaries
  if (player.x < 0) player.x = 0;
  if (player.x + player.width > gameMap.width) player.x = gameMap.width - player.width;
  if (player.y + player.height > gameMap.height) {
    player.y = gameMap.height - player.height;
    player.vy = 0;
    player.onGround = true;
  }

  // AI behavior
  aiPlayers.forEach(ai => {
    if (difficulty==='hard') {
      ai.targetX = player.x;
    } else {
      if (Math.abs(ai.x - ai.targetX) < 5) {
        ai.targetX = Math.random() * (gameMap.width - ai.width);
      }
    }
    // Move AI towards target
    if (ai.x < ai.targetX) ai.x += ai.speed;
    else if (ai.x > ai.targetX) ai.x -= ai.speed;

    // Keep AI above ground
    // For simplicity, AI don't jump
  });

  // Check detection
  for (let ai of aiPlayers) {
    if (isColliding(player, ai)) {
      alert('You have been found! Game Over.');
      startGame();
      return;
    }
  }

  draw();
  requestAnimationFrame(update);
}

function checkCollisions(entity) {
  // Check collision with platforms
  entity.onGround = false;
  for (const platform of gameMap.platforms) {
    if (
      entity.x < platform.x + platform.width &&
      entity.x + entity.width > platform.x &&
      entity.y + entity.height > platform.y &&
      entity.y + entity.height < platform.y + platform.height
    ) {
      // Land on platform
      entity.y = platform.y - entity.height;
      entity.vy = 0;
      entity.onGround = true;
    }
  }
  // Check collision with obstacles (solid walls)
  for (const obs of gameMap.obstacles) {
    if (
      entity.x < obs.x + obs.width &&
      entity.x + entity.width > obs.x &&
      entity.y + entity.height > obs.y &&
      entity.y + entity.height < obs.y + obs.height
    ) {
      // Land on obstacle
      entity.y = obs.y - entity.height;
      entity.vy = 0;
      entity.onGround = true;
    }
  }
}

function isColliding(a, b) {
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

function draw() {
  ctx.clearRect(0, 0, 800, 600);
  // Draw map
  ctx.fillStyle = '#555';
  ctx.fillRect(0, 0, gameMap.width, gameMap.height);
  ctx.fillStyle = '#222';

  // Draw platforms
  for (const p of gameMap.platforms) {
    ctx.fillStyle = '#888';
    ctx.fillRect(p.x, p.y, p.width, p.height);
  }

  // Draw obstacles
  for (const obs of gameMap.obstacles) {
    ctx.fillStyle = '#444';
    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
  }

  // Draw hiding spots
  for (const hs of gameMap.hidingSpots) {
    ctx.fillStyle = 'yellow';
    ctx.fillRect(hs.x, hs.y, hs.width, hs.height);
  }

  // Draw player
  ctx.fillStyle = player.color;
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // Draw AI
  for (const ai of aiPlayers) {
    ctx.fillStyle = ai.color;
    ctx.fillRect(ai.x, ai.y, ai.width, ai.height);
  }
}
</script>
</body>
</html>
